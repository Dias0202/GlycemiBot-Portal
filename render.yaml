services:
  - type: web
    name: glycemibot-portal
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /portal/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: BACKEND_URL
        value: https://glycemibot-api.onrender.com
      - key: NEXT_PUBLIC_API_URL
        value: ""
